commands:
  install_backend: cd /Users/dwasserm/sources/NeuroLang && uv sync --extra dev --extra server
  install_frontend: cd /Users/dwasserm/sources/NeuroLang/neurolang/utils/server/neurolang-sparklis && npm install
  test_backend: cd /Users/dwasserm/sources/NeuroLang && .venv/bin/python -m pytest neurolang/utils/server/tests/ -x -v --timeout=120
  test_frontend: cd /Users/dwasserm/sources/NeuroLang/neurolang/utils/server/neurolang-sparklis && npm test -- --run
  typecheck_frontend: cd /Users/dwasserm/sources/NeuroLang/neurolang/utils/server/neurolang-sparklis && npx tsc --noEmit
  lint_frontend: cd /Users/dwasserm/sources/NeuroLang/neurolang/utils/server/neurolang-sparklis && npm run lint
  build_frontend: cd /Users/dwasserm/sources/NeuroLang/neurolang/utils/server/neurolang-sparklis && npm run build

services:
  tornado-backend:
    start: cd /Users/dwasserm/sources/NeuroLang && .venv/bin/python -m neurolang.utils.server.app --port=8888 &
    stop: lsof -ti :8888 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:8888/v1/engines
    port: 8888
    depends_on: []

  react-dev:
    start: cd /Users/dwasserm/sources/NeuroLang/neurolang/utils/server/neurolang-sparklis && PORT=3100 npm run dev &
    stop: lsof -ti :3100 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3100
    port: 3100
    depends_on: []
