[pydocstyle]
# Suppress conflicting rule pairs so pydocstyle can run without false positives.
# D211 conflicts with D203 (blank line before class docstring).
# D212 conflicts with D213 (summary line position).
# D200 conflicts with multi-line docstrings.
# D205, D400, D401, D413, D415 are stylistic preferences not enforced here.
ignore = D200,D203,D205,D211,D212,D400,D401,D413,D415
match_dir = (?!examples).*
