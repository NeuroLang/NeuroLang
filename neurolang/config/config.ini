[DEFAULT]
debug = False
expressionTypePrinting = True
# threshold for CD_relations.py
cardinalRelationThreshold = 0.8

[RAS]
# which backend to use for RAS = pandas, dask, polars or sql
backend = polars
# when running dask backend, use synchronous or asynchronous scheduler
synchronous = True
# use uuid or human readable ids for tables and views when using dask backend
tableIds = human

[CHASE]
# Maximum number of chase iterations before raising an error.
# This prevents infinite loops with cyclic or very deep recursive data.
# Set to 0 to disable the limit (use with caution).
max_iterations = 10000

[ONTOLOGIES]
structural_knowledge_namespace = 'neurolang:'


[PROBABILISTIC_SOLVER]
check_unate = True
